name: Interface CI

# Auto-triggers disabled — CI runs locally on liralot now
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: interface-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Interface Quality
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: interface
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun ci

      - name: Typecheck
        run: bunx tsc --noEmit
